<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      text-align: center;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      padding: 12px;
      margin: 10px 0;
      background: #34495e;
      border-radius: 6px;
      cursor: pointer;
    }

    .sidebar ul li:hover {
      background: #1abc9c;
    }

    /* Main content */
    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .card p {
      font-size: 24px;
      color: #1abc9c;
    }

  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Dashboard</h2>
    <ul>
      <li>Home</li>
      <li>Products</li>
      <li>Orders</li>
      <li>Users</li>
      <li>Settings</li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <h1>Welcome, Admin</h1>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Total Sales</h3>
        <p>$1,200</p>
      </div>

      <div class="card">
        <h3>Orders</h3>
        <p>320</p>
      </div>

      <div class="card">
        <h3>Users</h3>
        <p>150</p>
      </div>

      <div class="card">
        <h3>Products</h3>
        <p>85</p>
      </div>
    </div>
  </div>

</body>
</html>
